<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Basic Endless Runner</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #2c3e50;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background-color: #87CEEB; /* Aasman ka color */
            border: 4px solid #ecf0f1;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="600" height="250"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Player ki settings
    const player = {
        x: 50,
        y: 180,
        width: 30,
        height: 30,
        color: "#e74c3c", // Red player
        velocityY: 0,
        gravity: 0.6,
        jumpPower: -10,
        isJumping: false
    };

    let obstacles = [];
    let score = 0;
    let gameSpeed = 5;
    let frameCount = 0;
    let isGameOver = false;

    // Controls: Spacebar, ArrowUp, ya screen par tap
    function jump() {
        if (!player.isJumping && !isGameOver) {
            player.velocityY = player.jumpPower;
            player.isJumping = true;
        }
    }

    window.addEventListener("keydown", (e) => {
        if (e.code === "Space" || e.code === "ArrowUp") jump();
    });
    window.addEventListener("touchstart", jump);

    // Obstacles spawn karne ka function
    function spawnObstacle() {
        let obstacle = {
            x: canvas.width,
            y: 190,
            width: 20,
            height: 20,
            color: "#2ecc71" // Green obstacles
        };
        obstacles.push(obstacle);
    }

    // Main Game Loop
    function update() {
        if (isGameOver) return;

        // Canvas clear karna (Har frame ko refresh karne ke liye)
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Zameen (Ground) draw karna
        ctx.fillStyle = "#8e44ad";
        ctx.fillRect(0, 210, canvas.width, 40);

        // Player par Physics apply karna
        player.velocityY += player.gravity;
        player.y += player.velocityY;

        // Player ko zameen par rokna
        if (player.y >= 180) {
            player.y = 180;
            player.velocityY = 0;
            player.isJumping = false;
        }

        // Player Draw karna
        ctx.fillStyle = player.color;
        ctx.fillRect(player.x, player.y, player.width, player.height);

        // Naye obstacles add karna
        frameCount++;
        if (frameCount % 80 === 0) { // Spawn speed yaha se control hogi
            spawnObstacle();
        }

        // Obstacles move aur draw karna
        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            obs.x -= gameSpeed;

            ctx.fillStyle = obs.color;
            ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

            // Collision Detection (Takkar check karna)
            if (player.x < obs.x + obs.width &&
                player.x + player.width > obs.x &&
                player.y < obs.y + obs.height &&
                player.height + player.y > obs.y) {
                
                isGameOver = true;
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "white";
                ctx.font = "bold 30px Arial";
                ctx.fillText("Game Over!", 210, 100);
                ctx.font = "20px Arial";
                ctx.fillText("Final Score: " + score, 230, 140);
                return; // Game rok do
            }
        }

        // Jo obstacles screen ke bahar chale gaye unhe hatana aur score badhana
        obstacles = obstacles.filter(obs => {
            if (obs.x + obs.width < 0) {
                score++;
                if(score % 10 === 0) gameSpeed += 0.3; // Har 10 point par speed badhegi
                return false;
            }
            return true;
        });

        // Score Draw karna
        ctx.fillStyle = "#333";
        ctx.font = "bold 20px Arial";
        ctx.fillText("Score: " + score, 20, 30);

        // Loop repeat karna
        requestAnimationFrame(update);
    }

    // Game Start
    update();
</script>

</body>
</html>
